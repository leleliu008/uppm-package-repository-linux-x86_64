name: publish

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  publish:
    runs-on: ubuntu-latest

    container: alpine:3.16

    env:
      ACLOCAL_PATH: /usr/share/aclocal
      GH_PRIVATE_TOKEN: ${{ secrets.GH_PRIVATE_TOKEN }}
      PKG_NAMES: aria2 axel bash bat bison bmake bzip2 cmake coreutils cppcheck ctop curlie curl darkhttpd diffutils dos2unix ed file findutils flex gawk git glow gm4 gmake gnupg gh gn gogs gotop gotty gperf grep gsed gtar gzip hugo jq lazygit libarchive lzip lz4 mediainfo mosh mpg123 nasm ninja openssl patchelf patch pkg-config pngquant proot putty pigz qpdf quickjs rsync rtmpdump sqlite starship strace tcpdump tealdeer tig tmux tree uctags unrar unzip uppm util-linux wget xmake xxd xz yasm youtubedr yq zopfli zstd

    steps:
      - uses: actions/checkout@v3

      - run: wget https://raw.githubusercontent.com/leleliu008/ppkg/master/bin/ppkg
      - run: chmod a+x ppkg
      - run: ./ppkg setup --use-system-package-manager
      - run: ./ppkg update
      - run: ./ppkg install $PKG_NAMES --link-type=static-only --install-lib=static
      - run: |
          for PKG_NAME in $PKG_NAMES
          do
            if [ -d /opt/ppkg/installed/$PKG_NAME/bin ] ||       [ -d /opt/ppkg/installed/$PKG_NAME/sbin ] ; then
               [ -d /opt/ppkg/installed/$PKG_NAME/include ] && rm -rf /opt/ppkg/installed/$PKG_NAME/include
               [ -d /opt/ppkg/installed/$PKG_NAME/lib ]     && rm -rf /opt/ppkg/installed/$PKG_NAME/lib
               ./ppkg pack $PKG_NAME
            fi
          done

      - run: mv -v /opt/ppkg/cache.d/bin/* package

      - run:  ./test.sh

      - run: ln -s /opt/ppkg/installed/gh/bin/gh /usr/local/bin/gh

      - run: printf '%s\n' "$GH_PRIVATE_TOKEN" | gh auth login --with-token

      - run: ./publish
